name: Deploy Auth to Windows Home

on:
  push:
    branches:
      - deploy/windows-home
    paths:
      - "AuthFoundation/**"
      - "AuthFoundationTest/**"
      - ".github/workflows/deploy-windows-home.yml"
      - "scripts/deploy-windows.ps1"
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - windows
      - auth-home
    defaults:
      run:
        shell: powershell -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command ". '{0}'"
    env:
      DOTNET_VERSION: "10.0.x"
      DOTNET_INSTALL_DIR: "${{ github.workspace }}\\_dotnet"
      PUBLISH_DIR: "${{ github.workspace }}\\artifacts\\publish"
      DEPLOY_ROOT: "${{ secrets.AUTH_DEPLOY_ROOT }}"
      RELEASE_ROOT: "${{ secrets.AUTH_RELEASE_ROOT }}"
      SERVICE_STOP_COMMAND: "${{ secrets.AUTH_SERVICE_STOP_COMMAND }}"
      SERVICE_START_COMMAND: "${{ secrets.AUTH_SERVICE_START_COMMAND }}"
      HEALTHCHECK_URL: "${{ secrets.AUTH_HEALTHCHECK_URL }}"
      APPSETTINGS_PRODUCTION_JSON_B64: "${{ secrets.AUTH_APPSETTINGS_PRODUCTION_JSON_B64 }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "${{ env.DOTNET_VERSION }}"
          installation-path: "${{ env.DOTNET_INSTALL_DIR }}"

      - name: Restore
        run: dotnet restore ./AuthFoundation/AuthFoundation.sln

      - name: Test
        run: dotnet test ./AuthFoundationTest/AuthFoundationTest.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./AuthFoundation/AuthFoundation.csproj --configuration Release --no-restore --output "${env:PUBLISH_DIR}"

      - name: Deploy on Windows Home server
        run: >
          ./scripts/deploy-windows.ps1
          -PublishDir "${env:PUBLISH_DIR}"
          -DeployRoot "${env:DEPLOY_ROOT}"
          -ReleaseRoot "${env:RELEASE_ROOT}"
          -ServiceStopCommand "${env:SERVICE_STOP_COMMAND}"
          -ServiceStartCommand "${env:SERVICE_START_COMMAND}"
          -HealthcheckUrl "${env:HEALTHCHECK_URL}"
          -AppSettingsProductionJsonBase64 "${env:APPSETTINGS_PRODUCTION_JSON_B64}"
