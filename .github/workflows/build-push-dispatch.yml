name: Build Push And Dispatch Deploy

on:
  push:
    branches:
      - main
      - deploy/windows-home
  workflow_dispatch:

jobs:
  build-push-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: authfoundation
      DEPLOY_SERVICE: authfoundation-web
      DEPLOY_REPO: ${{ vars.AUTH_DEPLOY_REPO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image ref
        id: image
        run: |
          image_ref="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${{ github.sha }}"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t "${{ steps.image.outputs.image_ref }}" ./AuthFoundation
          docker push "${{ steps.image.outputs.image_ref }}"

      - name: Dispatch auth-deploy
        if: ${{ env.DEPLOY_REPO != '' && secrets.AUTH_DEPLOY_REPO_TOKEN != '' }}
        env:
          DISPATCH_TOKEN: ${{ secrets.AUTH_DEPLOY_REPO_TOKEN }}
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            "https://api.github.com/repos/${DEPLOY_REPO}/dispatches" \
            -d "{\"event_type\":\"deploy-service\",\"client_payload\":{\"service\":\"${DEPLOY_SERVICE}\",\"image_tag\":\"${{ github.sha }}\"}}"
