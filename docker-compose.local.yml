name: osolab-authfoundation-local

services:
  auth-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: osolab-authfoundation-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "OsolabAuth_Passw0rd!"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - auth-db-data:/var/opt/mssql

  auth-db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: osolab-authfoundation-db-init
    depends_on:
      auth-db:
        condition: service_started
    volumes:
      - ./local/mssql/init-authfoundation.sql:/init-authfoundation.sql:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "for i in {1..60}; do
        /opt/mssql-tools/bin/sqlcmd -S auth-db -U sa -P 'OsolabAuth_Passw0rd!' -Q 'SELECT 1' && break;
        sleep 2;
      done;
      /opt/mssql-tools/bin/sqlcmd -S auth-db -U sa -P 'OsolabAuth_Passw0rd!' -i /init-authfoundation.sql"
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: osolab-authfoundation-redis
    ports:
      - "63790:6379"
    volumes:
      - auth-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-api:
    build:
      context: .
      dockerfile: AuthFoundation/Dockerfile
    container_name: osolab-authfoundation-api
    profiles:
      - api
    depends_on:
      auth-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      Issuer: "http://localhost:5000/"
      AuthUiBaseUrl: "http://localhost:5700"
      DisableHttpsRedirection: "true"
      Cors__AllowedOrigins: "http://localhost:5700"
      DevelopmentClient__ClientId: "00000000000000000000000000000000"
      DevelopmentClient__RedirectUri: "http://localhost:5700/callback"
      UserInfo__SharedClientId: "00000000000000000000000000000000"
      ConnectionStrings__AuthDb: "Server=auth-db,1433;Database=AuthFoundation;User Id=sa;Password=OsolabAuth_Passw0rd!;TrustServerCertificate=True;Encrypt=True"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      SigningKey__KeyId: "local-dev-signing-key"
      SigningKey__PrivateKeyPem: "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQDewialmcgRFtD9\nAbtQQlw3cmz5qeXORf3xEfhHR+BCUWMW/7r5yNFSo5BSmGUDsPCCy+b+lVIzHZCI\n/9yeVmJRh7hH/lLxPKNVfxHwCOnK2gMnBUg1zwJWMvh98EkPL2JteqlS1m/rF0aA\nSYt4lW/vqunTOo/iq5/FcnyMdDONWP4MznqXZrs26tJdSXqrNtlG5TdPBgsx+Kpx\nEf+rvHgmkh00cnQ631iopuRtXxoftEVdn1ME49y0lJtCtQoMI51N92ZE5GarqTZo\n5DVtsDsKNgEpygK5ro4aTzPjorkqH83B/gIDKYHeTEXVlwCrNTMXaA6w5pcw/cZY\n+7253hOnAgMBAAECggEAEddZAxBzDrNWH72AxCfcfPBkPAbYihHfCezXhtYB5y3f\nktr+nbzwzv6cs5DTHl2QldlA8gkBoWhvyBk+EUx36XHGV7XN7NZfepyH0kLUftPB\nRuHMa8rdtAu3DVcuctHnvz8Aysq0Ag9GLUY2rnzBj1+QBMP+/Dekv0qxIQq5ikt9\nDYPP/HIvoxwIcvpK4q+ABQ7ImRRICLdMo3DYJ/UrOC4mibNy4NBXXfCgKcfN3U/h\n6gLCqye9T3ejIGOD9Pvk5wB+RgM6uIjpZGmSRBOBsyMWJWKq3Nwax/xi90UzZ8lg\np47uwJ3cRwITlazGtDr+mA88ZrDUKeBUfBMlofKzWQKBgQD/2RvG+gNgBAsGrAfb\n387ZXHWJTixG/cnmI0rAzLF66tfOxEOrND6RSLdEM4ugCRrkNIYEExA7+OSmSD9q\nDRRbXCzG8cumpif0SCERq3fWA0Azjc9Fg4btGwEugRiPqwxtus/cah+J37tpm8N7\nSs6QxY/aPiEMqjQjhP5SE8JWbQKBgQDe5AMyzCa6xp5Eym9TWLnzHEo9fq+r3fzb\nSahxHYDDUystO3Y08ZjR/j9pGDltD4om4lkE6gDdZPmGEkb7nPBwkyf0/ax9tEUg\ngkH14dXKSycY1xlncjGYgbX0beUvWXvSTVVYAByBx4jhs0w2EwQG+xbBf4naLyum\nBvlKCnaV4wKBgQD2RJorNj6HbnzaiD7sUwr9SLVOXDPcha+Q2Ym7+Ywgv+rI+TwV\nkK1lFTRq7p7IhdsfrLsPMvZec95LfKGlyD8/DYOAYABiQe+VgNRr+LvaAbkLpsXL\nqKX4lxTVGah1qfTFrpskE/aVtQjlx+wrQj+BNNmZ/lG7qh2TzxEqGiDnJQKBgHHQ\napWwy4IKU9z6pdggcWtjocE/BIM1ap2rQhjooMyclmqVd2nXiFqKgmSu2vwGuFvc\nruokd2aV3hiJErf+zoQdkIS4WDEkMTxFZ1sgA6Q1tfQoOi+pjwu6CGiVCTehcOnV\nVWQHQoc+lXXysVLXaPILmvYZoxHHjnlMDFWzfBRTAoGAMFb83hfM8ih6ZXDDlbwm\nBGElBRy+ObIkCyXz/BPYStTRdFGARmCe7pP19BMQVrQNa+chKqwPUQMs0NsHOq8H\noXCavfMO0/NRdxLAgpCW0Ex6e5xT16VC1GD9wpr/EZVJonESbRpylDNMaX4XfRjp\n7J2FO+Ol06U+QKrG3krsaUg=\n-----END PRIVATE KEY-----"
