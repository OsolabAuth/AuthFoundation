<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AuthFoundation Login</title>
</head>
<body>
  <h1>Login</h1>
  <p>Authorization session: <code id="session">__SESSION_ID__</code></p>

  <form id="loginForm">
    <label>Email <input type="email" id="email" required /></label><br />
    <label>Password <input type="password" id="password" required /></label><br />
    <button type="submit">Login</button>
  </form>

  <p><button id="signupBtn" type="button">Signup</button></p>
  <pre id="result"></pre>

  <script>
    const form = document.getElementById("loginForm");

    function utf8Bytes(text) {
      if (window.TextEncoder) {
        return new TextEncoder().encode(text);
      }

      const out = [];
      for (let i = 0; i < text.length; i++) {
        let cp = text.charCodeAt(i);
        if (cp >= 0xd800 && cp <= 0xdbff && i + 1 < text.length) {
          const low = text.charCodeAt(i + 1);
          if (low >= 0xdc00 && low <= 0xdfff) {
            cp = ((cp - 0xd800) << 10) + (low - 0xdc00) + 0x10000;
            i++;
          }
        }

        if (cp <= 0x7f) {
          out.push(cp);
        } else if (cp <= 0x7ff) {
          out.push(0xc0 | (cp >> 6), 0x80 | (cp & 0x3f));
        } else if (cp <= 0xffff) {
          out.push(0xe0 | (cp >> 12), 0x80 | ((cp >> 6) & 0x3f), 0x80 | (cp & 0x3f));
        } else {
          out.push(
            0xf0 | (cp >> 18),
            0x80 | ((cp >> 12) & 0x3f),
            0x80 | ((cp >> 6) & 0x3f),
            0x80 | (cp & 0x3f)
          );
        }
      }
      return new Uint8Array(out);
    }

    function rightRotate(v, n) {
      return (v >>> n) | (v << (32 - n));
    }

    function sha256HexUpperFallback(text) {
      const K = [
        0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
        0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
        0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
        0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
        0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
        0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
        0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
        0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
      ];

      const bytes = utf8Bytes(text);
      const bitLength = bytes.length * 8;
      const paddedLength = ((bytes.length + 9 + 63) >> 6) << 6;
      const data = new Uint8Array(paddedLength);
      data.set(bytes);
      data[bytes.length] = 0x80;

      const view = new DataView(data.buffer);
      view.setUint32(paddedLength - 8, Math.floor(bitLength / 0x100000000));
      view.setUint32(paddedLength - 4, bitLength >>> 0);

      let h0 = 0x6a09e667;
      let h1 = 0xbb67ae85;
      let h2 = 0x3c6ef372;
      let h3 = 0xa54ff53a;
      let h4 = 0x510e527f;
      let h5 = 0x9b05688c;
      let h6 = 0x1f83d9ab;
      let h7 = 0x5be0cd19;

      const w = new Uint32Array(64);
      for (let offset = 0; offset < data.length; offset += 64) {
        for (let i = 0; i < 16; i++) {
          w[i] = view.getUint32(offset + (i * 4));
        }

        for (let i = 16; i < 64; i++) {
          const s0 = rightRotate(w[i - 15], 7) ^ rightRotate(w[i - 15], 18) ^ (w[i - 15] >>> 3);
          const s1 = rightRotate(w[i - 2], 17) ^ rightRotate(w[i - 2], 19) ^ (w[i - 2] >>> 10);
          w[i] = (w[i - 16] + s0 + w[i - 7] + s1) >>> 0;
        }

        let a = h0;
        let b = h1;
        let c = h2;
        let d = h3;
        let e = h4;
        let f = h5;
        let g = h6;
        let h = h7;

        for (let i = 0; i < 64; i++) {
          const S1 = rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25);
          const ch = (e & f) ^ ((~e) & g);
          const temp1 = (h + S1 + ch + K[i] + w[i]) >>> 0;
          const S0 = rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22);
          const maj = (a & b) ^ (a & c) ^ (b & c);
          const temp2 = (S0 + maj) >>> 0;

          h = g;
          g = f;
          f = e;
          e = (d + temp1) >>> 0;
          d = c;
          c = b;
          b = a;
          a = (temp1 + temp2) >>> 0;
        }

        h0 = (h0 + a) >>> 0;
        h1 = (h1 + b) >>> 0;
        h2 = (h2 + c) >>> 0;
        h3 = (h3 + d) >>> 0;
        h4 = (h4 + e) >>> 0;
        h5 = (h5 + f) >>> 0;
        h6 = (h6 + g) >>> 0;
        h7 = (h7 + h) >>> 0;
      }

      return [h0, h1, h2, h3, h4, h5, h6, h7]
        .map((v) => v.toString(16).padStart(8, "0"))
        .join("")
        .toUpperCase();
    }

    async function sha256HexUpper(text) {
      if (window.crypto && window.crypto.subtle) {
        try {
          const hash = await crypto.subtle.digest("SHA-256", utf8Bytes(text));
          return Array.from(new Uint8Array(hash))
            .map((b) => b.toString(16).padStart(2, "0"))
            .join("")
            .toUpperCase();
        } catch {
          // Fallback to pure JS in non-secure context or browser restrictions.
        }
      }

      return sha256HexUpperFallback(text);
    }

    document.getElementById("signupBtn").addEventListener("click", () => {
      const sid = document.getElementById("session").textContent.trim();
      window.location.href = "/Signup/Account/view?session_id=" + encodeURIComponent(sid);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const sid = document.getElementById("session").textContent.trim();
      const passInput = document.getElementById("password").value;
      try {
        const passValue = await sha256HexUpper(passInput);
        if (!/^[A-F0-9]{64}$/.test(passValue)) {
          throw new Error("hash failed");
        }

        const body = new URLSearchParams({
          email: document.getElementById("email").value,
          password: passValue
        });

        const res = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            ...(sid ? { "x-session-id": sid } : {})
          },
          body: body.toString()
        });

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          data = { raw: text };
        }
        document.getElementById("result").textContent = JSON.stringify(data, null, 2);

        const location = res.headers.get("Location");
        if (res.ok && data.result === "redirect" && location) {
          window.location.href = location;
        }
      } catch {
        document.getElementById("result").textContent = JSON.stringify(
          { result: "error", message: "Password hashing failed in browser." },
          null,
          2
        );
      }
    });
  </script>
</body>
</html>
